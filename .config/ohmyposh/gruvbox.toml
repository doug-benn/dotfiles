console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
alignment = "left"
type = "prompt"

[[blocks.segments]]
background = "#3A3A3A"
foreground = "#ffffff"
style = "powerline"
template = "{{ if .WSL }}WSL at{{ end }} {{.Icon}} "
type = "os"

[[blocks.segments]]
background = "#458588"
foreground = "#282828"
powerline_symbol = ""
style = "powerline"
template = " {{ .Path }} "
type = "path"

[blocks.segments.properties]
style = "full"

[[blocks.segments]]
background = "#98971A"
background_templates = [
  "{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}",
  "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}",
  "{{ if gt .Ahead 0 }}#B388FF{{ end }}",
  "{{ if gt .Behind 0 }}#B388FF{{ end }}",
]
foreground = "#282828"
leading_diamond = ""
powerline_symbol = ""
style = "powerline"
template = " {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} "
trailing_diamond = ""
type = "git"

[blocks.segments.properties]
branch_max_length = 25
fetch_stash_count = true
fetch_status = true
branch_icon = " "
branch_identical_icon = "●"

[[blocks.segments]]
background = "#8ED1F7"
foreground = "#111111"
powerline_symbol = ""
style = "powerline"
template = "  {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
type = "go"

[blocks.segments.properties]
fetch_version = true

[[blocks.segments]]
background = "#4063D8"
foreground = "#111111"
powerline_symbol = ""
style = "powerline"
template = "  {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
type = "julia"

[blocks.segments.properties]
fetch_version = true

[[blocks.segments]]
background = "#FFDE57"
foreground = "#111111"
powerline_symbol = ""
style = "powerline"
template = "  {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
type = "python"

[blocks.segments.properties]
display_mode = "files"
fetch_virtual_env = false

[[blocks.segments]]
background = "#AE1401"
foreground = "#ffffff"
powerline_symbol = ""
style = "powerline"
template = "  {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
type = "ruby"

[blocks.segments.properties]
display_mode = "files"
fetch_version = true

[[blocks.segments]]
background = "#FEAC19"
foreground = "#ffffff"
powerline_symbol = ""
style = "powerline"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
type = "azfunc"

[blocks.segments.properties]
display_mode = "files"
fetch_version = false

[[blocks.segments]]
background_templates = [
  "{{if contains \"default\" .Profile}}#FFA400{{end}}",
  "{{if contains \"jan\" .Profile}}#f1184c{{end}}",
]
foreground = "#ffffff"
powerline_symbol = ""
style = "powerline"
template = "  {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} "
type = "aws"

[blocks.segments.properties]
display_default = false

[[blocks.segments]]
background = "#ffff66"
foreground = "#111111"
powerline_symbol = ""
style = "powerline"
template = "  "
type = "root"
