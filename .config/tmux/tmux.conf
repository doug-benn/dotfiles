set-option -a terminal-features 'xterm-256color:RGB'

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

set -g prefix ^A
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g mode-keys vi
set -g mouse on
set -g detach-on-destroy off

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-pain-control'


set -g @sessionx-zoxide-mode 'on'
set -g @continuum-restore 'on'


#Theme/UI
set -g status-position top

set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'

#Adds Prefix "on" icon bottom right
set -g @tmux-gruvbox-left-status-a "#{?client_prefix,#[bg=colour167]#[fg=colour237]   ,#[fg=colour237]   }#{?client_prefix,#[bg=colour241]#[fg=colour167],#[fg=colour241]}#[bg=colour241,fg=colour248] #S"


set -g @tmux-gruvbox-right-status-z '#h #{tmux_mode_indicator}'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'